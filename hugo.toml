baseURL = '/'
languageCode = 'kn'
defaultContentLanguage = 'kn'
defaultContentLanguageInSubdir = false
title = 'My New Hugo Project'
cleanDestinationDir = true

[languages.kn]
  languageName = "ಕನ್ನಡ"
  weight = 1
  contentDir = "content/kn"

  [[languages.kn.menus.main]]
    name       = "ಲೇಖನಗಳು"
    url        = "/articles/"
    weight     = 10

  [[languages.kn.menus.main]]
    name       = "ಸುದ್ದಿ"
    url        = "/news/"
    weight     = 30

  [[languages.kn.menus.main]]
    name       = "ನಮ್ಮ ಬಗ್ಗೆ"
    url        = "/about/"
    weight     = 50

[languages.en]
  languageName = "EN"
  weight = 2
  contentDir = "content/en"

  [[languages.en.menus.main]]
    name       = "Articles"
    url        = "/en/articles/"
    weight     = 10

  [[languages.en.menus.main]]
    name       = "News"
    url        = "/en/news/"
    weight     = 30

  [[languages.en.menus.main]]
    name       = "About"
    url        = "/en/about/"
    weight     = 50

[taxonomies]
  tag      = "tags"
  category = "categories"
  state    = "states"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "A production-ready Hugo site built with best practices."
  [params.social]
    # twitter = ""  # Set your Twitter/X handle here when ready
    github  = "anand-raj"

[related]
  threshold    = 60
  includeNewer = true
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 60
  [[related.indices]]
    name   = "date"
    weight = 10

