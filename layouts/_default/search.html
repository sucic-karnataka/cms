{{ define "main" }}
<div class="content-wrap">
  <div class="search-page">

    <header class="search-page-header">
      <h1 class="search-page-title">{{ i18n "search_title" }}</h1>
      <form class="search-form search-form--page" id="search-form" action="{{ "/search/" | relURL }}" method="get">
        <div class="search-input-wrap">
          <input
            type="search"
            name="q"
            id="search-input"
            placeholder="{{ i18n "search_placeholder" }}"
            class="search-input"
            autocomplete="off"
            autofocus>
          <button type="submit" class="search-btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </form>
    </header>

    <div id="search-status" class="search-status" aria-live="polite"></div>
    <div id="search-results" class="search-results"
         data-index-url="{{ with .Site.Home.OutputFormats.Get "JSON" }}{{ .RelPermalink }}{{ else }}{{ "index.json" | relURL }}{{ end }}"
         data-no-results="{{ i18n "search_no_results" }}"
         data-enter-term="{{ i18n "search_enter_term" }}"
         data-unavailable="{{ i18n "search_unavailable" }}"
         data-result-for="{{ i18n "search_result_for" | default "result for" }}"
         data-results-for="{{ i18n "search_results_for" | default "results for" }}"></div>

  </div>
</div>

{{- $fuseIntegrity := "sha384-PCSoOZTpbkikBEtd/+uV3WNdc676i9KUf01KOA8CnJotvlx8rRrETbDuwdjqTYvt" -}}
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"
        integrity="{{ $fuseIntegrity }}"
        crossorigin="anonymous"
        defer></script>
{{- $searchJS := resources.Get "js/search.js" | minify | fingerprint -}}
<script src="{{ $searchJS.RelPermalink }}" integrity="{{ $searchJS.Data.Integrity }}" crossorigin="anonymous" defer></script>
{{ end }}
